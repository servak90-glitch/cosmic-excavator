
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    
    <!-- PWA Settings -->
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Drill">
    
    <title>КОСМИЧЕСКИЙ ЭКСКАВАТОР</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              zinc: { 950: '#09090b' }
            },
            animation: {
              'float-up': 'floatUp 1s ease-out forwards',
              'glitch-anim': 'glitch 0.3s cubic-bezier(.25, .46, .45, .94) both infinite',
            },
            keyframes: {
              floatUp: {
                '0%': { transform: 'translateY(0) scale(1)', opacity: '1' },
                '50%': { opacity: '1' },
                '100%': { transform: 'translateY(-40px) scale(1.1)', opacity: '0' },
              },
              glitch: {
                '0%': { transform: 'translate(0)' },
                '20%': { transform: 'translate(-2px, 2px)' },
                '40%': { transform: 'translate(-2px, -2px)' },
                '60%': { transform: 'translate(2px, 2px)' },
                '80%': { transform: 'translate(2px, -2px)' },
                '100%': { transform: 'translate(0)' }
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            font-family: 'Space Mono', monospace;
            color: #fff;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .pixel-text {
            font-family: 'Press Start 2P', cursive;
        }
        canvas {
            image-rendering: pixelated;
        }
        /* Custom Scrollbar Hide */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* DYNAMIC CRT EFFECT */
        :root {
            --crt-warp: 0px;
            --crt-aberration: 0px;
            --crt-scanline-opacity: 0.2;
        }

        .crt {
            position: relative;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Scanlines */
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, var(--crt-scanline-opacity)) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* Chromatic Aberration & Glow */
        .crt::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0;
            z-index: 9999;
            pointer-events: none;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
        }

        /* Screen Distortion Hook */
        .screen-content {
            filter: drop-shadow(var(--crt-aberration) 0 0 rgba(255,0,0,0.5)) drop-shadow(calc(var(--crt-aberration) * -1) 0 0 rgba(0,255,255,0.5));
            transform: perspective(1000px) rotateX(var(--crt-warp));
            transition: filter 0.2s, transform 0.2s;
            height: 100%;
            width: 100%;
        }
    </style>
